<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Duel Casino — No KYC, Instant Crypto Withdrawals">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%"  stop-color="#0e1830"/>
      <stop offset="55%" stop-color="#0a1120"/>
      <stop offset="100%" stop-color="#060a13"/>
    </radialGradient>
    <linearGradient id="bladeG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7afff0"/>
    </linearGradient>
    <pattern id="hex" width="60" height="52" patternUnits="userSpaceOnUse">
      <path d="M30 0 L60 17 L60 34 L30 52 L0 34 L0 17 Z"
            fill="none" stroke="#00ff88" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="bloom" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#hex)"/>

  <!-- ambient bokeh -->
  <g filter="url(#soft)" opacity="0.55">
    <circle cx="220"  cy="500" r="120" fill="#00ff88" opacity="0.25"/>
    <circle cx="980"  cy="140" r="160" fill="#00bbff" opacity="0.18"/>
    <circle cx="600"  cy="320" r="180" fill="#00ff88" opacity="0.12"/>
  </g>

  <!-- crypto symbols (faint) -->
  <g fill="#00ff88" opacity="0.18" font-family="Arial,sans-serif" font-weight="900">
    <text x="120" y="180" font-size="56">₿</text>
    <text x="1040" y="500" font-size="60">Ξ</text>
    <text x="920" y="220" font-size="38">◎</text>
    <text x="180" y="430" font-size="34">Ł</text>
  </g>

  <!-- crossed sabers -->
  <g filter="url(#bloom)" stroke-linecap="round">
    <line x1="200"  y1="120" x2="1000" y2="510" stroke="url(#bladeG)" stroke-width="6"/>
    <line x1="200"  y1="510" x2="1000" y2="120" stroke="url(#bladeG)" stroke-width="6"/>
    <circle cx="200"  cy="120" r="11" fill="#00ff88"/>
    <circle cx="1000" cy="120" r="11" fill="#00ff88"/>
    <circle cx="200"  cy="510" r="11" fill="#00ff88"/>
    <circle cx="1000" cy="510" r="11" fill="#00ff88"/>
    <!-- clash spark -->
    <circle cx="600" cy="315" r="22" fill="#ffffff"/>
    <circle cx="600" cy="315" r="46" fill="#00ff88" opacity="0.45"/>
    <circle cx="600" cy="315" r="90" fill="#00ff88" opacity="0.18"/>
  </g>

  <!-- wordmark -->
  <g text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="600" y="200" font-size="22" letter-spacing="8" fill="#00ff88" font-weight="700">VERIFIED REVIEW · 2026</text>
    <text x="600" y="380" font-size="120" font-weight="900" letter-spacing="10"
          fill="url(#title)" filter="url(#bloom)">DUEL CASINO</text>
    <text x="600" y="445" font-size="28" letter-spacing="4" fill="#e6ecf5" font-weight="600" opacity="0.9">
      NO&#160;KYC · INSTANT&#160;CRYPTO&#160;WITHDRAWALS
    </text>
    <g font-size="20" fill="#9be9c2" font-weight="600" letter-spacing="2">
      <text x="600" y="540">★★★★★ &#160; 4.9 / 5 &#160; · &#160; 412 EXPERT TESTS</text>
    </g>
  </g>
</svg>

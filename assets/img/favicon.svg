<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Duel Casino">
  <defs>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#bfffd9"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="12" ry="12" fill="#060a13"/>

  <g stroke-linecap="round">
    <line x1="14" y1="14" x2="50" y2="50" stroke="url(#blade)" stroke-width="5"/>
    <line x1="14" y1="50" x2="50" y2="14" stroke="url(#blade)" stroke-width="5"/>
    <circle cx="14" cy="14" r="3.2" fill="#00ff88"/>
    <circle cx="50" cy="14" r="3.2" fill="#00ff88"/>
    <circle cx="14" cy="50" r="3.2" fill="#00ff88"/>
    <circle cx="50" cy="50" r="3.2" fill="#00ff88"/>
  </g>

  <circle cx="32" cy="32" r="14" fill="url(#spark)" opacity="0.85"/>
  <circle cx="32" cy="32" r="4" fill="#ffffff"/>
</svg>
